		C200000000000000000000C4 /* Deepen FFmpeg frameworks */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
			);
			name = "Deepen FFmpeg frameworks";
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "# FFmpegKit 的 xcframework 在 macOS 上是 shallow bundle（Info.plist 与二进制在根部），\n# 而 macOS 内嵌 framework 必须是 deep（Versions/A/...），否则 Xcode 的 Validate 阶段报错。\n# 这里把内嵌进 app 的每个 framework 就地转换为 deep 结构并重签名。\nset -euo pipefail\nFW_DIR=\"${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\n[ -d \"$FW_DIR\" ] || exit 0\nIDENT=\"${EXPANDED_CODE_SIGN_IDENTITY:--}\"\nshopt -s nullglob\nfor fw in \"$FW_DIR\"/*.framework; do\n  name=\"$(basename \"$fw\" .framework)\"\n  [ -d \"$fw/Versions\" ] && continue      # 已是 deep\n  [ -f \"$fw/$name\" ] || continue          # 无同名二进制则跳过\n  mkdir -p \"$fw/Versions/A/Resources\"\n  mv \"$fw/$name\" \"$fw/Versions/A/$name\"\n  [ -f \"$fw/Info.plist\" ] && mv \"$fw/Info.plist\" \"$fw/Versions/A/Resources/Info.plist\"\n  [ -d \"$fw/Headers\" ] && mv \"$fw/Headers\" \"$fw/Versions/A/Headers\"\n  [ -d \"$fw/Modules\" ] && mv \"$fw/Modules\" \"$fw/Versions/A/Modules\"\n  rm -rf \"$fw/_CodeSignature\"\n  ln -sfn A \"$fw/Versions/Current\"\n  ln -sfn \"Versions/Current/$name\" \"$fw/$name\"\n  ln -sfn Versions/Current/Resources \"$fw/Resources\"\n  [ -d \"$fw/Versions/A/Headers\" ] && ln -sfn Versions/Current/Headers \"$fw/Headers\"\n  [ -d \"$fw/Versions/A/Modules\" ] && ln -sfn Versions/Current/Modules \"$fw/Modules\"\n  /usr/bin/codesign --force --sign \"$IDENT\" --timestamp=none \"$fw\"\ndone\n";
		};
/* End PBXShellScriptBuildPhase section */

