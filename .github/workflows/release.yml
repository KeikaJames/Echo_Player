# 发版工作流：推送 v* 形式的 tag 即自动构建并发布 Release。
#
#   git tag v1.1 && git push origin v1.1
#
# 产物：Echo.Player.<tag>.zip（内含 Echo Player.app），发布说明自动附带
# SHA256 指纹——应用内更新器下载后会比对这个指纹，防篡改/防传错。
#
# 说明：
# - 构建需要 Xcode 26（macOS 26 SDK）。若 GitHub 托管 runner 尚未提供该镜像，
#   此工作流会失败——届时在本机跑 scripts 里同样的四步，手动 `gh release create` 即可。
# - Whisper 模型（约 465MB）会在 CI 里从 Hugging Face 拉取后打进包（开箱即用）；
#   拉取失败不阻塞发版，应用会在首次深度识别时自行下载。
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: 选择 Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: 内置 Whisper 模型（失败不阻塞）
        continue-on-error: true
        run: |
          pip3 install -q "huggingface_hub[cli]"
          hf download argmaxinc/whisperkit-coreml \
            --include "openai_whisper-small/*" \
            --local-dir /tmp/whisper
          mkdir -p "LyricPlayer/Resources/WhisperModel"
          mv /tmp/whisper/openai_whisper-small "LyricPlayer/Resources/WhisperModel/"

      - name: 构建 Release
        run: |
          xcodebuild -project LyricPlayer.xcodeproj -scheme LyricPlayer \
            -configuration Release -derivedDataPath build build

      - name: 打包 + 指纹
        id: package
        run: |
          cd build/Build/Products/Release
          mv LyricPlayer.app "Echo Player.app"
          ditto -c -k --keepParent "Echo Player.app" "Echo.Player.${GITHUB_REF_NAME}.zip"
          HASH=$(shasum -a 256 "Echo.Player.${GITHUB_REF_NAME}.zip" | cut -d' ' -f1)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          echo "zip=build/Build/Products/Release/Echo.Player.${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: 发布 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "SHA256: ${{ steps.package.outputs.sha256 }}"
            echo ""
            echo "首次安装请看官网教程（未签名应用需右键→打开）：https://keikajames.github.io/Echo_Player/"
            echo "已安装用户无需操作——应用会自动提示更新。"
          } > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.zip }}" \
            --title "Echo Player $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md
